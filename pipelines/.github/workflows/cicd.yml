name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install flask

      - name: Run Basic Test
        run: |
          echo "Running basic checks..."
          python -c "print('App OK')"

      - name: Build Docker Image
        run: |
          docker build -t slo-calculator .

      - name: Run Docker Container
        run: |
          docker run -d -p 5000:5000 slo-calculator